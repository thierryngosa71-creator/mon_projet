<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonMaquette | Portfolio Créatif</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="bg-abstract"></div>
    
    <div class="container">
        <!-- Header avec photo à droite et nom à côté -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-cube"></i>
                <span>MonMaquette</span>
            </div>
            <div class="student-info">
                <div class="student-details">
                    <span class="student-role">Étudiant créatif</span>
                    <strong class="student-name">Ngosa Lubeka Thierry</strong>
                </div>
                <div class="student-photo">
                    <img src="45.jpg" alt="Ngosa Lubeka Thierry">
                    <div class="status-dot"></div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav">
            <button class="nav-link active" data-page="home">
                <i class="fas fa-home"></i> Accueil
            </button>
            <button class="nav-link" data-page="articles">
                <i class="fas fa-blog"></i> Blog
            </button>
            <button class="nav-link" data-page="about">
                <i class="fas fa-user"></i> Profil
            </button>
            <button class="nav-link" data-page="contact">
                <i class="fas fa-comment"></i> Échange
            </button>
        </nav>

        <!-- Contenu principal -->
        <div class="main-content">
            <main id="dynamicContent"></main>
        </div>

        <footer class="footer">
            <p>MonMaquette — Créé par Ngosa Lubeka Thierry</p>
        </footer>
    </div>

    <script>
        const ETUDIANT = "Ngosa Lubeka Thierry";
        
        // NOUVEAUX CONTENUS POUR CHAQUE ONGLET
        const pagesData = {
            home: {
                title: `✨ Bienvenue, je suis ${ETUDIANT} ✨`,
                desc: "",
                features: [
                    { icon: "fas fa-bolt", name: "Créativité sans limite", text: "Des designs uniques qui sortent de l'ordinaire" },
                    { icon: "fas fa-globe", name: "Web moderne", text: "Technologies à la pointe de l'innovation" },
                    { icon: "fas fa-heart", name: "Passion & dévouement", text: "Chaque projet est une œuvre unique" }
                ]
            },
            articles: {
                title: "📝 Mon parcours créatif",
                subtitle: "Découvrez mes réflexions et apprentissages",
                posts: [
                    { title: "🎨 L'art du design minimaliste", desc: "Comment la simplicité peut transformer l'expérience utilisateur et créer des interfaces mémorables." },
                    { title: "⚡ Performance web : mon obsession", desc: "Les techniques que j'utilise pour rendre mes sites ultra-rapides et fluides." },
                    { title: "🌍 Voyage à travers le CSS moderne", desc: "Grid, Flexbox, Container Queries : mon retour d'expérience." },
                    { title: "💡 5 leçons apprises en 2025", desc: "Ce que mon année d'études m'a appris sur le développement et la créativité." }
                ]
            },
            about: {
                title: "💫 Qui suis-je ?",
                bio: `Je m'appelle <strong>${ETUDIANT}</strong> et je suis un étudiant passionné par la création d'interfaces web innovantes. Ma philosophie : allier esthétique, performance et accessibilité pour offrir le meilleur du web.`,
                passion: "Mon objectif est de devenir un créateur d'expériences digitales, où chaque détail compte et raconte une histoire.",
                values: ["Innovation", "Minimalisme", "Performance", "Bienveillance"]
            },
            contact: {
                title: "🤝 Travaillons ensemble",
                message: "Envie de collaborer ? Discutons de votre projet !",
                email: "ngosalubeka.fr",
                phone: "+243 987 654 321",
                location: "Lubumbashi / Paris",
                disponibility: "Disponible pour missions & collaborations"
            }
        };

        function renderHome() {
            return `
                <div class="hero">
                    <div class="hero-badge"><i class="fas fa-sparkle"></i> Portfolio 2026</div>
                    <h2>${pagesData.home.title}</h2>
                    <p class="hero-desc">${pagesData.home.desc}</p>
                    <div class="features">
                        ${pagesData.home.features.map(f => `
                            <div class="feature">
                                <div class="feature-icon"><i class="${f.icon}"></i></div>
                                <h4>${f.name}</h4>
                                <p>${f.text}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderArticles() {
            return `
                <div class="section-header">
                    <h2>${pagesData.articles.title}</h2>
                    <p>${pagesData.articles.subtitle}</p>
                </div>
                <div class="articles-grid">
                    ${pagesData.articles.posts.map(post => `
                        <article class="article-card">
                            <div class="article-icon">${post.title.charAt(0)}</div>
                            <div class="article-body">
                                <h3>${post.title}</h3>
                                <p>${post.desc}</p>
                                <a href="#" class="read-link">Lire la suite →</a>
                            </div>
                        </article>
                    `).join('')}
                </div>
            `;
        }

        function renderAbout() {
            return `
                <div class="section-header">
                    <h2>${pagesData.about.title}</h2>
                </div>
                <div class="profile-container">
                    <div class="profile-card">
                        <div class="profile-quote">
                            <i class="fas fa-quote-left"></i>
                            <p>${pagesData.about.bio}</p>
                        </div>
                        <div class="profile-passion">
                            <h3><i class="fas fa-compass"></i> Ma vision</h3>
                            <p>${pagesData.about.passion}</p>
                        </div>
                        <div class="profile-values">
                            <h3><i class="fas fa-star"></i> Mes valeurs</h3>
                            <div class="values-list">
                                ${pagesData.about.values.map(v => `<span class="value-tag">${v}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderContact() {
            return `
                <div class="section-header">
                    <h2>${pagesData.contact.title}</h2>
                    <p>${pagesData.contact.message}</p>
                </div>
                <div class="contact-grid">
                    <div class="contact-infos">
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <div><strong>Email</strong><br>${pagesData.contact.email}</div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-phone-alt"></i>
                            <div><strong>Téléphone</strong><br>${pagesData.contact.phone}</div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div><strong>Localisation</strong><br>${pagesData.contact.location}</div>
                        </div>
                        <div class="info-item highlight">
                            <i class="fas fa-calendar-check"></i>
                            <div><strong>Disponibilité</strong><br>${pagesData.contact.disponibility}</div>
                        </div>
                    </div>
                    <div class="contact-note">
                        <i class="fas fa-hand-peace"></i>
                        <p>N'hésitez pas à me contacter, je réponds sous 24h !</p>
                    </div>
                </div>
            `;
        }

        function loadPage(page) {
            const container = document.getElementById('dynamicContent');
            let html = '';
            switch(page) {
                case 'home': html = renderHome(); break;
                case 'articles': html = renderArticles(); break;
                case 'about': html = renderAbout(); break;
                case 'contact': html = renderContact(); break;
                default: html = renderHome();
            }
            container.innerHTML = html;
        }

        function initNav() {
            const btns = document.querySelectorAll('.nav-link');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadPage(btn.dataset.page);
                });
            });
        }

        initNav();
        loadPage('home');
    </script>
</body>
</html>
